name: release
'on':
  push:
    branches:
      - main
      - tools-2.0.0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  draft_release:
    # Skip if the commit message contains the AltStore update message or [skip ci] (prevents infinite loop)
    if: ${{ !contains(github.event.head_commit.message, 'Update AltStore source for version') && !contains(github.event.head_commit.message, '[skip ci]') && github.event.head_commit.author.name != 'GitHub Action' }}
    permissions:
      contents: write # Allows this job to create releases

    strategy:
      fail-fast: true
      matrix:
        # os: [macos-latest, ubuntu-latest, windows-latest]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      prerelease: ${{ steps.release-flags.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          # cache: 'npm'

      - run: yarn install --no-frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Get Package Version
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - run: yarn build
      - run: yarn zip
      - run: yarn build:firefox
      - run: yarn zip:firefox

      - name: Set Release Flags
        id: release-flags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/tools-2.0.0" ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Live Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: ${{ steps.get-version.outputs.version }}
          draft: false
          prerelease: ${{ steps.release-flags.outputs.prerelease }}
          files: |
            .output/autodarts-tools-${{ steps.get-version.outputs.version }}-chrome.zip
            .output/autodarts-tools-${{ steps.get-version.outputs.version }}-firefox.zip

  build_ios_app:
    permissions:
      contents: write # Allows this job to create releases
    
    # Use macos-15 which has Xcode 16.x pre-installed with iOS 18 SDK
    runs-on: macos-15
    timeout-minutes: 30
    needs: draft_release

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: yarn install --no-frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      
      - name: Get Package Version
        run: echo "VERSION=${{ needs.draft_release.outputs.version }}" >> $GITHUB_ENV
        
      - name: Build Safari Extension
        run: |
          yarn build -b safari
          bun run scripts/safari.ts
          
      - name: Update Xcode Project Version
        run: |
          bun run scripts/update-xcode-version.ts
      
      - name: Setup Xcode Environment
        run: |
          # Use default Xcode 16.x on macos-15 (has iOS 18 platform pre-installed)
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode.app
          sudo xcodebuild -runFirstLaunch || true
          sudo xcodebuild -license accept
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Build and Archive iOS App
        run: |
          cd "Tools for Autodarts"
          # Build the archive - no destination flag needed for archive with -sdk iphoneos
          set -o pipefail
          xcodebuild \
            -project "Tools for Autodarts.xcodeproj" \
            -scheme "Tools for Autodarts (iOS)" \
            -configuration Release \
            -archivePath "./build/ToolsForAutodarts.xcarchive" \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            archive \
            2>&1 | tee xcodebuild.log || {
              echo "Build failed. Showing last 100 lines of build log:"
              tail -100 xcodebuild.log
              echo ""
              echo "Searching for errors:"
              grep -i "error:" xcodebuild.log | tail -20 || true
              exit 1
            }
          
          # Verify the archive was created
          ls -la ./build/ToolsForAutodarts.xcarchive/Products/Applications/
      
      - name: Create IPA File
        run: |
          # Switch to correct directory
          cd "Tools for Autodarts"
          
          # Create Payload directory
          mkdir -p Payload
          
          # Copy the .app file to the Payload directory
          cp -R "./build/ToolsForAutodarts.xcarchive/Products/Applications/Tools for Autodarts.app" Payload/
          
          # Create zip file and rename to .ipa
          zip -r "autodarts-tools-ios.ipa" Payload
          
          # Move to output directory
          mkdir -p ../.output
          mv "autodarts-tools-ios.ipa" ../.output/
          
          # Cleanup
          rm -rf Payload
          
          # Verify IPA was created
          ls -la ../.output/
      
      - name: Update Release with IPA File
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ needs.draft_release.outputs.version }}
          name: ${{ needs.draft_release.outputs.version }}
          draft: false
          prerelease: ${{ needs.draft_release.outputs.prerelease }}
          files: |
            .output/autodarts-tools-ios.ipa

  submit_to_app_store:
    permissions:
      contents: read

    runs-on: macos-15
    timeout-minutes: 30
    needs: [draft_release, build_ios_app]
    # Only submit from main branch (not prereleases)
    if: needs.draft_release.outputs.prerelease == 'false'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: yarn install --no-frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build Safari Extension
        run: |
          yarn build -b safari
          bun run scripts/safari.ts

      - name: Update Xcode Project Version
        run: bun run scripts/update-xcode-version.ts

      - name: Setup Xcode Environment
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode.app
          sudo xcodebuild -runFirstLaunch || true
          sudo xcodebuild -license accept
          xcodebuild -version

      - name: Install Apple Certificate and Provisioning Profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_APP_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_APP_BASE64 }}
          APPLE_PROVISIONING_PROFILE_EXTENSION_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_EXTENSION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_APP_PATH=$RUNNER_TEMP/app_profile.mobileprovision
          PP_EXT_PATH=$RUNNER_TEMP/ext_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode from base64
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APPLE_PROVISIONING_PROFILE_APP_BASE64" | base64 --decode -o $PP_APP_PATH
          echo -n "$APPLE_PROVISIONING_PROFILE_EXTENSION_BASE64" | base64 --decode -o $PP_EXT_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

          # Verify certificate was imported correctly
          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "=== Keychain search list ==="
          security list-keychain -d user

          # Install provisioning profiles with their UUID as filename
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          APP_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_APP_PATH))
          EXT_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_EXT_PATH))

          cp $PP_APP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${APP_PROFILE_UUID}.mobileprovision
          cp $PP_EXT_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${EXT_PROFILE_UUID}.mobileprovision

          echo "APP_PROFILE_UUID=${APP_PROFILE_UUID}" >> $GITHUB_ENV
          echo "EXT_PROFILE_UUID=${EXT_PROFILE_UUID}" >> $GITHUB_ENV

      - name: Configure code signing for App Store
        run: |
          cd "Tools for Autodarts"
          python3 << 'PYEOF'
          import os

          pbxproj_path = "Tools for Autodarts.xcodeproj/project.pbxproj"
          app_uuid = os.environ["APP_PROFILE_UUID"]
          ext_uuid = os.environ["EXT_PROFILE_UUID"]

          with open(pbxproj_path, 'r') as f:
              content = f.read()

          # Switch all targets to manual signing
          content = content.replace(
              'CODE_SIGN_STYLE = Automatic',
              'CODE_SIGN_STYLE = Manual'
          )

          # Use distribution identity
          content = content.replace(
              'CODE_SIGN_IDENTITY = "Apple Development"',
              'CODE_SIGN_IDENTITY = "Apple Distribution"'
          )

          # Set provisioning profile per target by bundle ID
          # Extension must be replaced first (longer match prevents partial overlap)
          content = content.replace(
              'PRODUCT_BUNDLE_IDENTIFIER = "com.boltapi.autodarts-tools.extension";',
              'PRODUCT_BUNDLE_IDENTIFIER = "com.boltapi.autodarts-tools.extension";\n\t\t\t\tPROVISIONING_PROFILE = "' + ext_uuid + '";'
          )
          content = content.replace(
              'PRODUCT_BUNDLE_IDENTIFIER = "com.boltapi.autodarts-tools";',
              'PRODUCT_BUNDLE_IDENTIFIER = "com.boltapi.autodarts-tools";\n\t\t\t\tPROVISIONING_PROFILE = "' + app_uuid + '";'
          )

          with open(pbxproj_path, 'w') as f:
              f.write(content)

          print("Code signing configured for App Store distribution")
          PYEOF

      - name: Build and Archive for App Store
        run: |
          cd "Tools for Autodarts"
          set -o pipefail
          xcodebuild \
            -project "Tools for Autodarts.xcodeproj" \
            -scheme "Tools for Autodarts (iOS)" \
            -configuration Release \
            -archivePath "./build/AppStore.xcarchive" \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive \
            2>&1 | tee xcodebuild-appstore.log || {
              echo "Build failed. Last 100 lines:"
              tail -100 xcodebuild-appstore.log
              exit 1
            }

      - name: Create ExportOptions.plist
        run: |
          cat > "Tools for Autodarts/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.boltapi.autodarts-tools</key>
              <string>${APP_PROFILE_UUID}</string>
              <key>com.boltapi.autodarts-tools.extension</key>
              <string>${EXT_PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

      - name: Write App Store Connect API Key
        run: |
          echo -n "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode -o $RUNNER_TEMP/AuthKey.p8

      - name: Export and Upload to App Store Connect
        run: |
          cd "Tools for Autodarts"
          xcodebuild -exportArchive \
            -archivePath "./build/AppStore.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "./build/AppStoreExport" \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/AuthKey.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Submit for App Store Review
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: bun run scripts/submit-to-app-store.ts

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  check_version_change:
    permissions:
      contents: read
    
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [draft_release, build_ios_app]
    outputs:
      version_changed: ${{ steps.compare-versions.outputs.version_changed }}
    
    steps:
      - uses: actions/checkout@v3
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          
      - name: Compare Versions
        id: compare-versions
        run: |
          # Get current version from package.json
          CURRENT_VERSION="${{ needs.draft_release.outputs.version }}"
          
          # Get latest version from AltStore source
          ALTSTORE_VERSION=$(node -p "
            const fs = require('fs');
            const source = JSON.parse(fs.readFileSync('Autodarts_Tools_Source.json', 'utf8'));
            const app = source.apps.find(app => app.bundleIdentifier === 'com.boltapi.autodarts-tools');
            app && app.versions && app.versions.length > 0 ? app.versions[0].version : '';
          ")
          
          echo "Current version: $CURRENT_VERSION"
          echo "AltStore version: $ALTSTORE_VERSION"
          
          # Always proceed with update - let the script handle whether to add or update
          echo "version_changed=true" >> $GITHUB_OUTPUT
          if [[ "$CURRENT_VERSION" != "$ALTSTORE_VERSION" ]]; then
            echo "Version has changed, will update AltStore source"
          else
            echo "Version is the same, will update existing AltStore source entry"
          fi

  update_altstore_source:
    permissions:
      contents: write # Allows this job to commit changes
    
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [draft_release, build_ios_app, check_version_change]
    if: needs.check_version_change.outputs.version_changed == 'true'
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          
      - name: Download IPA from Live Release
        run: |
          # Create output directory
          mkdir -p .output
          
          # Download the IPA file from the live release
          curl -L -o .output/autodarts-tools-ios.ipa \
            "https://github.com/${{ github.repository }}/releases/download/${{ needs.draft_release.outputs.version }}/autodarts-tools-ios.ipa"
          
          # Verify the file was downloaded
          ls -la .output/
          
      - name: Update AltStore Source
        run: |
          node scripts/update-altstore-source.js "${{ needs.draft_release.outputs.version }}" "${{ needs.draft_release.outputs.prerelease }}"
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Autodarts_Tools_Source.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update AltStore source for version ${{ needs.draft_release.outputs.version }} [skip ci]"
            git push
          fi

      - name: Create Pull Request for AltStore Source Update (Fallback)
        if: failure()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update AltStore source for version ${{ needs.draft_release.outputs.version }} [skip ci]"
          title: "Update AltStore source for version ${{ needs.draft_release.outputs.version }}"
          body: |
            This PR updates the AltStore source file with the new version ${{ needs.draft_release.outputs.version }}.
            
            Changes:
            - Updated version information in Autodarts_Tools_Source.json
            - Added news entry for the new release
            
            This PR was automatically created by the release workflow as a fallback when direct push failed.
          branch: update-altstore-source-${{ needs.draft_release.outputs.version }}
          delete-branch: true
          base: main
